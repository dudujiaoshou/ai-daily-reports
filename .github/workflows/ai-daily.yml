name: AI Daily Report

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

env:
  SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY }}
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate AI Report
        id: generate
        run: |
          python << 'PYEOF'
          import os
          import requests
          from datetime import datetime

          now = datetime.now()
          date_str = now.strftime('%Y-%m-%d')
          is_pm = now.hour >= 12
          file_suffix = "_PM" if is_pm else "_AM"
          filename = "AI日报_" + date_str + file_suffix + ".md"

          system_prompt = """你是一个专业的AI行业分析师。请根据最新信息，生成一份完整的AI行业日报。

报告必须包含以下三部分，严格按格式输出Markdown：

## 一、全球AI/科技/投资最新新闻
搜索并整理今天最新的全球AI、科技、投资领域动态，包括重要模型发布、融资事件、产品更新、政策动向等，整理为5-10条要点，重要数据加粗。

## 二、中国AI创业公司数据分析
搜索国内AI创业公司最新动态，聚焦以下维度：
- 融资/投资动作（金额、轮次、投资方）
- 细分赛道（具身智能/AI Agent/AI医疗/AI芯片等）
- 有发展潜力的新兴公司
输出结构化分析（表格+要点），至少覆盖5家公司。

## 三、上海AI相关活动整理
搜索公众号、小红书、今日头条、Luma等平台上近期在上海举办的AI相关活动（线下沙龙、论坛、Meetup、Demo Day等），整理为表格，包含：活动名称、时间、地点、报名渠道/链接。重点关注近7天内可报名的活动。

格式要求：
- 使用中文
- 重要数据用**加粗**
- 每部分有小标题和要点
- 报告开头写明日期和类型（早报/晚报）
- 结尾标注"由 AI 自动生成"
"""

          user_prompt = "请生成" + date_str + "的AI行业日报，重点关注今天和近期的最新动态。"

          api_key = os.environ.get('NVIDIA_API_KEY')
          
          if api_key:
              url = "https://integrate.api.nvidia.com/v1/chat/completions"
              headers = {
                  "Authorization": "Bearer " + api_key,
                  "Content-Type": "application/json"
              }
              payload = {
                  "model": "nvidia/llama-3.1-nemotron-70b-instruct",
                  "messages": [
                      {"role": "system", "content": system_prompt},
                      {"role": "user", "content": user_prompt}
                  ],
                  "max_tokens": 4000,
                  "temperature": 0.7
              }
              
              response = requests.post(url, headers=headers, json=payload)
              if response.status_code == 200:
                  result = response.json()
                  content = result['choices'][0]['message']['content']
              else:
                  content = "# AI Daily Report " + date_str + file_suffix + "\n\n[API Error: " + str(response.status_code) + "]\n"
          else:
              content = "# AI Daily Report " + date_str + file_suffix + "\n\n[Please set NVIDIA_API_KEY in GitHub Secrets]\n"
          
          with open(filename, 'w', encoding='utf-8') as f:
              f.write(content)
          
          print("Report generated: " + filename)
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write("filename=" + filename + "\n")
          
          PYEOF

      - name: Commit and push report
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "docs: $(date +'%Y-%m-%d %H:%M') auto update"
          git push

      - name: Send WeChat notification via Server酱
        if: env.SERVERCHAN_SCKEY != ''
        run: |
          python << 'PYEOF'
          import os
          import requests
          from datetime import datetime

          sckey = os.environ.get('SERVERCHAN_SCKEY')
          now = datetime.now()
          is_pm = now.hour >= 12
          report_type = "Evening" if is_pm else "Morning"
          
          with open("${{ steps.generate.outputs.filename }}", 'r', encoding='utf-8') as f:
              content = f.read()
          
          summary = content[:500] + "..." if len(content) > 500 else content
          
          url = "https://sc.ftqq.com/" + sckey + ".send"
          data = {
              "text": "AI Daily Report " + report_type + " | " + now.strftime('%m/%d %H:%M'),
              "desp": "**GitHub**: https://github.com/dudujiaoshou/ai-daily-reports\n\n---\n" + summary
          }
          
          try:
              resp = requests.post(url, data=data)
              print("Notification sent: " + resp.text)
          except Exception as e:
              print("Notification failed: " + str(e))
          
          PYEOF

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-daily-report-${{ env.GITHUB_RUN_NUMBER }}
          path: AI日报_*.md
          retention-days: 30
