name: AI Daily Report

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

env:
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests qrcode[pil] markdown wechatpy Pillow cryptography

      - name: Generate AI Report
        env:
          NVIDIA_API_KEY: ${{ env.NVIDIA_API_KEY }}
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
          PYTHONIOENCODING: utf-8
        run: python3 scripts/generate_report.py

      - name: Send to WeChat Official Account
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_APPSECRET: ${{ secrets.WX_APPSECRET }}
        run: python3 scripts/wechat_mass_send.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-daily-report-${{ github.run_number }}
          path: 'AI-Report_*.md'
          retention-days: 30
