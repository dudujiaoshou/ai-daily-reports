name: AI Daily Report

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

env:
  SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY }}
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Download generate script
        run: |
          cat > generate_report.py << 'ENDOFFILE'
#!/usr/bin/env python3
import os
import requests
from datetime import datetime

now = datetime.now()
date_str = now.strftime('%Y-%m-%d')
is_pm = now.hour >= 12
file_suffix = "_PM" if is_pm else "_AM"
filename = "AI鏃ユ姤_" + date_str + file_suffix + ".md"

system_prompt = """浣犳槸涓€涓笓涓氱殑AI琛屼笟鍒嗘瀽甯堛€傝鏍规嵁鏈€鏂颁俊鎭紝鐢熸垚涓€浠藉畬鏁寸殑AI琛屼笟鏃ユ姤銆?

鎶ュ憡蹇呴』鍖呭惈浠ヤ笅涓夐儴鍒嗭紝涓ユ牸鎸夋牸寮忚緭鍑篗arkdown锛?

