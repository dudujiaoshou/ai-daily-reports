name: AI Daily Report

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

env:
  SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY }}
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate AI Report
        env:
          NVIDIA_API_KEY: ${{ env.NVIDIA_API_KEY }}
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
        run: python3 scripts/generate_report.py

      - name: Commit and push report
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "docs: $(date +'%Y-%m-%d %H:%M') auto update"
          git push

      - name: Send WeChat notification via Server閰?
        if: env.SERVERCHAN_SCKEY != ''
        env:
          SERVERCHAN_SCKEY: ${{ env.SERVERCHAN_SCKEY }}
        run: python3 scripts/send_notification.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-daily-report-${{ env.GITHUB_RUN_NUMBER }}
          path: AI鏃ユ姤_*.md
          retention-days: 30