name: AI Daily Report

on:
  schedule:
    # 每天北京时间 7:30 (UTC 23:30)
    - cron: '30 23 * * *'
  workflow_dispatch:

env:
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests qrcode[pil] markdown wechatpy Pillow cryptography

      - name: Generate AI Report
        id: generate
        env:
          NVIDIA_API_KEY: ${{ env.NVIDIA_API_KEY }}
          GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
          PYTHONIOENCODING: utf-8
        run: python3 scripts/generate_report.py

      - name: Generate HTML Preview
        if: success()
        env:
          PYTHONIOENCODING: utf-8
        run: python3 scripts/generate_preview.py

      - name: Send to WeChat Official Account
        id: wechat
        if: success()
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_APPSECRET: ${{ secrets.WX_APPSECRET }}
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            python3 scripts/send_to_wechat.py && break
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done

      - name: Verify Draft Created
        if: always()
        run: |
          if [ -f "cover_dynamic.jpg" ]; then
            echo "✅ 动态封面已生成"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-daily-report-${{ github.run_number }}
          path: |
            AI-Report_*.md
            preview_draft.html
          retention-days: 30

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::每日AI日报生成失败！请检查日志。"
          echo "运行ID: ${{ github.run_id }}"
